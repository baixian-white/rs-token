# ADJSCC smoke config — 2 train batches × 1 epoch, smallest rate (C=10).
# Mirrors RS-Token training recipe: 256x256, batch 16, AdamW, bf16 AMP.

run_name: adjscc_smoke
seed: 42

data:
  splits_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/data/AID_splits_local
  image_size: 256
  batch_size: 16
  num_workers: 4
  pin_memory: true

model:
  image_size: 256
  in_channels: 3
  base_channels: 64
  n_symbol_channels: 10        # bits/image = 256 * 10 = 2560 (matches RS-Token k=1)
  af_hidden: 64
  train_snr_min: -2.0
  train_snr_max: 12.0
  train_channel: mixed

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 100
  total_epochs: 1
  grad_clip: 1.0

logging:
  log_every: 1
  save_every_epoch: 1
  ckpt_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/checkpoints/paper_v05/adjscc_smoke
  log_dir:  D:/CODE/遥感+通信/遥感+通信/rstoken/logs/paper_v05/adjscc_smoke

device: cuda
amp: true
amp_dtype: bf16
