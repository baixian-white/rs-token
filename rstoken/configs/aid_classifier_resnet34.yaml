# E16 AID classifier evaluator.
# Paths are relative to the rstoken/ project root.

run_name: aid_classifier_resnet34
seed: 42

data:
  splits_dir: data/AID_splits
  image_size: 224
  batch_size: 64
  num_workers: 4
  pin_memory: true

model:
  backbone: resnet34
  num_classes: 30
  pretrained: true

optim:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  total_epochs: 50
  grad_clip: 1.0

scheduler:
  name: cosine
  min_lr: 1.0e-6

logging:
  ckpt_dir: checkpoints/aid_classifier_resnet34
  log_dir: logs/aid_classifier_resnet34

device: cuda
amp: true
amp_dtype: bf16
