# Stage 3 RVQ + RemoteCLIP 蒸馏 (核心论点验证)
# 目标 (motivation.md 第 192 行):
#   - L0_bow / L0_emb 线性分类 test acc 比 Stage 2 baseline 高 ≥ 5pp
#     Stage 2 baseline: L0_bow=57.70%  L0_emb=47.40%  (zq_pool=48.30%, zpre_pool=69.20%)
#   - 重建 PSNR 与 Stage 2 (26.10) 差距 < 0.5dB (motivation.md 第 195 行的承诺)
# 与 Stage 2 唯一差异:
#   1. 新增 distill 段 + loss.distill_weight=0.5
#   2. 训练循环里加 RemoteCLIP teacher + DistillHead, 对 L0 量化后特征做 cosine align

run_name: rvq_distill_v1
seed: 42

data:
  splits_dir: H:/H-CODE/遥感+通信/rstoken/data/AID_splits
  image_size: 256
  batch_size: 16
  num_workers: 4
  pin_memory: true

model:
  in_channels: 3
  base_channels: 64
  channel_multipliers: [1, 2, 4, 4]
  num_res_blocks: 1
  latent_dim: 256
  codebook_size: 1024
  commitment_weight: 0.25
  quantizer: rvq
  rvq_num_quantizers: 4

distill:
  teacher_ckpt: H:/H-CODE/遥感+通信/rstoken/checkpoints/remoteclip/RemoteCLIP-ViT-B-32.pt
  teacher_name: ViT-B-32
  head_hidden: 512                         # DistillHead 中间层维度

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 500
  total_epochs: 50
  grad_clip: 1.0

loss:
  l1_weight: 1.0
  lpips_weight: 0.1
  vq_weight: 1.0
  distill_weight: 0.5                      # ← Stage 3 关键
  lpips_net: alex

logging:
  log_every: 50
  val_every_epoch: 1
  save_every_epoch: 5
  num_vis_samples: 8
  use_wandb: false
  wandb_project: rstoken
  ckpt_dir: H:/H-CODE/遥感+通信/rstoken/checkpoints/rvq_distill
  log_dir:  H:/H-CODE/遥感+通信/rstoken/logs/rvq_distill

device: cuda
amp: true
amp_dtype: bf16
