# E42 — RVQ K-ablation: K=6 (seed 42).
# Total bits at full K = 256 patches × 10 bits/code × 6 = 15,360 bits/image.
# Tests whether more residual layers improve max PSNR enough to justify the
# extra bit budget.

run_name: rvq_distill_K6_s42
seed: 42

data:
  splits_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/data/AID_splits_local
  image_size: 256
  batch_size: 16
  num_workers: 4
  pin_memory: true

model:
  in_channels: 3
  base_channels: 64
  channel_multipliers: [1, 2, 4, 4]
  num_res_blocks: 1
  latent_dim: 256
  codebook_size: 1024
  commitment_weight: 0.25
  quantizer: rvq
  rvq_num_quantizers: 6

distill:
  teacher_ckpt: D:/CODE/遥感+通信/遥感+通信/rstoken/checkpoints/remoteclip/RemoteCLIP-ViT-B-32.pt
  teacher_name: ViT-B-32
  head_hidden: 512
  target: l0

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 500
  total_epochs: 50
  grad_clip: 1.0

loss:
  l1_weight: 1.0
  lpips_weight: 0.1
  vq_weight: 1.0
  distill_weight: 0.5
  lpips_net: alex

logging:
  log_every: 50
  val_every_epoch: 1
  save_every_epoch: 5
  num_vis_samples: 8
  use_wandb: false
  wandb_project: rstoken
  ckpt_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/checkpoints/paper_v05/rvq_distill_K6_s42
  log_dir:  D:/CODE/遥感+通信/遥感+通信/rstoken/logs/paper_v05/rvq_distill_K6_s42

device: cuda
amp: true
amp_dtype: bf16
