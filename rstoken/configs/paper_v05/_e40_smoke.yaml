# E40 smoke config — never used for production runs.
# Outputs go to a junk dir under tmp_e40_smoke/.

run_name: e40_smoke
seed: 41

data:
  splits_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/data/AID_splits_local
  image_size: 256
  batch_size: 4
  num_workers: 0
  pin_memory: false

model:
  in_channels: 3
  base_channels: 64
  channel_multipliers: [1, 2, 4, 4]
  num_res_blocks: 1
  latent_dim: 256
  codebook_size: 1024
  commitment_weight: 0.25
  quantizer: rvq
  rvq_num_quantizers: 4

distill:
  teacher_ckpt: D:/CODE/遥感+通信/遥感+通信/rstoken/checkpoints/remoteclip/RemoteCLIP-ViT-B-32.pt
  teacher_name: ViT-B-32
  head_hidden: 512
  target: l0

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 500
  total_epochs: 50
  grad_clip: 1.0

loss:
  l1_weight: 1.0
  lpips_weight: 0.1
  vq_weight: 1.0
  distill_weight: 0.5
  lpips_net: alex

logging:
  log_every: 1
  val_every_epoch: 1
  save_every_epoch: 5
  num_vis_samples: 4
  use_wandb: false
  wandb_project: rstoken
  ckpt_dir: D:/CODE/遥感+通信/遥感+通信/rstoken/tmp_e40_smoke/ckpt
  log_dir:  D:/CODE/遥感+通信/遥感+通信/rstoken/tmp_e40_smoke/log

device: cuda
amp: true
amp_dtype: bf16
